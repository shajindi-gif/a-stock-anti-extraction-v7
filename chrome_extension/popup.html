<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <title>A股反收割系统 v8</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header>
      <span class="logo">🚀</span>
      <div>
        <h1>反收割 v8</h1>
        <p>执行闭环 + 东财条件单</p>
      </div>
    </header>

    <select id="scenario" class="select"></select>
    <button id="runBtn" class="btn">▶ 运行分析</button>

    <div class="prob-bar" id="probBar">
      <div class="seg up" id="segUp"></div>
      <div class="seg side" id="segSide"></div>
      <div class="seg down" id="segDown"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <label>标的</label>
        <span id="symbol">—</span>
      </div>
      <div class="stat">
        <label>决策</label>
        <span id="decision" class="badge">—</span>
      </div>
      <div class="stat">
        <label>路由</label>
        <span id="orderRoute">—</span>
      </div>
      <div class="stat">
        <label>条件单</label>
        <span id="condCount">—</span>
      </div>
    </div>

    <div id="condList" class="cond-list"></div>
    <pre id="report" class="report"></pre>

    <footer>⚠️ 不构成投资建议 · v8</footer>
  </div>

  <script src="js/v7-core.js"></script>
  <script src="js/v8-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
